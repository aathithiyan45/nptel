<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HCI Mock Test 4</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}
h1 {
    text-align: center;
}
.question {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.correct { border-left: 5px solid green; }
.wrong { border-left: 5px solid red; }
button {
    padding: 12px 25px;
    font-size: 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
#result {
    margin-top: 20px;
    font-size: 22px;
    text-align: center;
}
.correctText { color: green; }
</style>

</head>
<body>

<h1>HCI Mock Exam 4</h1>

<form id="quizForm"></form>

<div style="text-align:center;">
    <button type="button" onclick="submitQuiz()">Submit</button>
</div>

<div id="result"></div>

<script>

const questions = [

{q:"1. What is the primary focus of Human-Computer Interaction (HCI)?",
options:["A) The study of computer hardware specifications.",
"B) The study of how people design, implement, and use interactive computer systems.",
"C) The development of new programming languages.",
"D) The analysis of network protocols."],
answer:"B) The study of how people design, implement, and use interactive computer systems."},

{q:"2. According to the lecture, what is the foundational layer of a good product, measured by efficiency, effectiveness, learnability, memorability, and satisfaction?",
options:["A) User Experience (UX)",
"B) Interaction Design (IxD)",
"C) Usability",
"D) Customer Experience (CX)"],
answer:"C) Usability"},

{q:"3. Keystroke Dynamics is described as a powerful form of behavioral biometrics that reveals:",
options:["A) What a user types, but not how they type.",
"B) How a user types, but not what they type.",
"C) Both what and how a user types.",
"D) Only the speed of typing."],
answer:"B) How a user types, but not what they type."},

{q:"4. What is the purpose of a Problem Statement in an HCI project?",
options:["A) To list all possible solutions.",
"B) To provide a clear, focused goal for design efforts.",
"C) To describe the final product's features.",
"D) To outline the project budget."],
answer:"B) To provide a clear, focused goal for design efforts."},

{q:"5. The \"Norman Door\" is an example of bad design because it:",
options:["A) Is too expensive to manufacture.",
"B) Lacks clear signifiers, creating conflict between intuition and function.",
"C) Is aesthetically unpleasing.",
"D) Requires too much physical strength to open."],
answer:"B) Lacks clear signifiers, creating conflict between intuition and function."},

{q:"6. What does \"emergence\" refer to in the context of Large Language Models (LLMs)?",
options:["A) The sudden popularity of a new AI model.",
"B) The unlocking of new, advanced capabilities not present in smaller models due to increased scale and data.",
"C) The process of an AI model learning from new, real-time data.",
"D) The ability of an LLM to generate completely novel ideas without any training data."],
answer:"B) The unlocking of new, advanced capabilities not present in smaller models due to increased scale and data."},

{q:"7. What is \"Behavior-Optimized Content\"?",
options:["A) Content designed purely for aesthetic appeal.",
"B) Content specifically designed to elicit a desired behavioral response.",
"C) Content that is randomly generated by an LLM.",
"D) Content that summarizes user behavior."],
answer:"B) Content specifically designed to elicit a desired behavioral response."},

{q:"8. How does Kyron's Advanced Plagiarism Check differentiate from traditional text-matching software?",
options:["A) It only checks for plagiarism in code.",
"B) It analyzes keystroke patterns and mouse movements to detect behavioral plagiarism.",
"C) It requires manual review by a human proctor for every submission.",
"D) It only works for specific Indian languages."],
answer:"B) It analyzes keystroke patterns and mouse movements to detect behavioral plagiarism."},

{q:"9. What is a key differentiator of Audino's Hate Speech AI, as mentioned in the lecture?",
options:["A) Its ability to generate hate speech for research purposes.",
"B) Its specialization in analyzing Indian languages and dialects for content moderation.",
"C) Its exclusive focus on visual hate speech detection.",
"D) Its capability to predict future hate speech trends."],
answer:"B) Its specialization in analyzing Indian languages and dialects for content moderation."},

{q:"10. What is the core principle of \"Privacy by Design\"?",
options:["A) Adding privacy features at the end of the development cycle.",
"B) Embedding privacy considerations into the design and architecture of systems from the very beginning.",
"C) Relying solely on user agreements for privacy protection.",
"D) Minimizing security measures to enhance usability."],
answer:"B) Embedding privacy considerations into the design and architecture of systems from the very beginning."},

{q:"11. In the Shannon-Weaver Model of communication, what does \"The Effectiveness Problem\" ask?",
options:["A) How accurately is the message transmitted?",
"B) How effectively does the received meaning affect conduct in a desired way?",
"C) How well is the message understood semantically?",
"D) How quickly can the message be encoded and decoded?"],
answer:"B) How effectively does the received meaning affect conduct in a desired way?"},

{q:"12. The MSDL-MCA approach was used in the autism diagnosis project to address which specific challenge?",
options:["A) The high cost of specialized hardware for data collection.",
"B) The lack of large datasets of Indian children's facial expressions for training deep learning models.",
"C) The difficulty in obtaining IRB approval for AI-based diagnostic tools.",
"D) The need for real-time speech analysis in noisy environments."],
answer:"B) The lack of large datasets of Indian children's facial expressions for training deep learning models."},

{q:"13. What is the primary function of Automatic Speech Recognition (ASR) in a conversational system?",
options:["A) To convert text into spoken language.",
"B) To convert spoken language into digital text.",
"C) To manage the flow of conversation.",
"D) To understand the user's intent."],
answer:"B) To convert spoken language into digital text."},

{q:"14. Which prototyping fidelity is described as focusing on structure, layout, and flow, often using basic sketches or simple digital wireframes?",
options:["A) High-Fidelity (Hi-Fi)",
"B) Medium-Fidelity (Mid-Fi)",
"C) Low-Fidelity (Lo-Fi)",
"D) Ultra-Fidelity (U-Fi)"],
answer:"C) Low-Fidelity (Lo-Fi)"},

{q:"15. When building a running app for a visually impaired user, which role would be primarily responsible for ensuring compatibility with assistive technologies like screen readers?",
options:["A) UI Designer",
"B) Interaction Designer",
"C) Accessibility Designer",
"D) Motion Designer"],
answer:"C) Accessibility Designer"},

{q:"16. According to the lecture, what is \"friction\" in the context of product design?",
options:["A) A necessary component for user engagement.",
"B) Any aspect of a product that disrupts, hinders, or creates discomfort in the user's experience.",
"C) The aesthetic appeal of a product's surface.",
"D) The speed at which a user can complete a task."],
answer:"B) Any aspect of a product that disrupts, hinders, or creates discomfort in the user's experience."},

{q:"17. Why is \"Consistency\" a crucial principle in interaction design?",
options:["A) It allows for more creative and varied interfaces.",
"B) It creates a predictable and learnable interface, reducing the learning curve.",
"C) It makes the system more visually appealing.",
"D) It helps in reducing the overall development cost."],
answer:"B) It creates a predictable and learnable interface, reducing the learning curve."},

{q:"18. Which interaction design approach is characterized by design decisions based on the designer's own knowledge, intuition, and experience, often with minimal user research, and can lead to radical innovation but also carries high risk?",
options:["A) User-Centered Design (UCD)",
"B) Activity-Centered Design (ACD)",
"C) System Design",
"D) Genius Design"],
answer:"D) Genius Design"},

{q:"19. Design Thinking is described as a user-centered, non-linear, and iterative ________ for creative problem-solving.",
options:["A) methodology",
"B) mindset",
"C) tool",
"D) outcome"],
answer:"B) mindset"},

{q:"20. What is the primary purpose of prototyping in the interaction design workflow?",
options:["A) To create static documents for client approval.",
"B) To make abstract ideas tangible and testable for behavior.",
"C) To finalize the visual aesthetics of the product.",
"D) To write the initial code for the application."],
answer:"B) To make abstract ideas tangible and testable for behavior."},

{q:"21. According to the 5 Dimensions of IXD, which dimension helps designers consider how a user and system's actions and reactions contribute to the interaction?",
options:["A) Words",
"B) Visual Representations",
"C) Physical Objects",
"D) Behavior"],
answer:"D) Behavior"},

{q:"22. In Figma, what does a \"Frame\" primarily represent?",
options:["A) A single image file.",
"B) A top-level container for a single screen or view in a design.",
"C) A collection of interactive components.",
"D) A link between two different prototypes."],
answer:"B) A top-level container for a single screen or view in a design."},

{q:"23. Which quadrant of an Empathy Map captures the user's internal monologue, worries, and beliefs that they might not say aloud?",
options:["A) Says",
"B) Thinks",
"C) Does",
"D) Feels"],
answer:"B) Thinks"},

{q:"24. Which of the following is a correct formula for a Point of View (POV) statement as described in the lecture?",
options:["A) \"[User] needs a way to [User Need] because [Insight]."",
"B) \"Our product will [Solution] for [Audience] to solve [Problem].\"",
"C) \"The market lacks [Feature], so we will build [Product].\"",
"D) \"We believe that [Assumption] will lead to [Outcome].\""],
answer:"A) \"[User] needs a way to [User Need] because [Insight].\""},

{q:"25. What is a user's \"Mental Model\"?",
options:["A) The designer's blueprint for how the system works.",
"B) A user's internal belief system and expectation of how a system works.",
"C) A visual representation of user emotions.",
"D) A fictional character representing a user group."],
answer:"B) A user's internal belief system and expectation of how a system works."},

{q:"26. What is the primary role of Information Architecture (IA) in interface design?",
options:["A) To define the visual style and aesthetics of the interface.",
"B) To organize, structure, and label content to help users find information and complete tasks.",
"C) To manage project workflows and deadlines.",
"D) To develop the backend database for the system."],
answer:"B) To organize, structure, and label content to help users find information and complete tasks."},

{q:"27. Which of the following is NOT one of the three principles of Direct Manipulation as described by Ben Shneiderman?",
options:["A) Continuous visual representation of the object of interest.",
"B) Physical actions instead of complex syntax.",
"C) Rapid, reversible actions with immediate visual feedback.",
"D) Reliance on complex keyboard commands for efficiency."],
answer:"D) Reliance on complex keyboard commands for efficiency."},

{q:"28. What are the \"3 T's\" of metadata crucial for maximizing discoverability on Behance?",
options:["A) Text, Theme, Time",
"B) Title, Tags, Tools",
"C) Type, Trend, Target",
"D) Topic, Template, Talent"],
answer:"B) Title, Tags, Tools"},

{q:"29. When building large-scale AI models, which technique involves having multiple people label the same data and measuring their consistency to identify ambiguity or poor performance?",
options:["A) Gold Standard",
"B) Majority Voting",
"C) Inter-Annotator Agreement",
"D) Statistical Significance Testing"],
answer:"C) Inter-Annotator Agreement"},

{q:"30. Which study design is more efficient and requires fewer participants, as the same group tests all conditions, but can introduce ordering effects?",
options:["A) Between-Group Design",
"B) Within-Group Design",
"C) Mixed-Method Design",
"D) Observational Study"],
answer:"B) Within-Group Design"}

];

function loadQuiz(){
    const form = document.getElementById("quizForm");

    questions.forEach((q,i)=>{
        const div = document.createElement("div");
        div.className="question";

        div.innerHTML = `<p>${q.q}</p>` +
        q.options.map(opt =>
            `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label><br>`
        ).join("");

        form.appendChild(div);
    });
}

function submitQuiz(){
    let score=0;
    const allQuestions = document.getElementsByClassName("question");

    questions.forEach((q,i)=>{
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const div = allQuestions[i];

        div.classList.remove("correct","wrong");

        const old = div.querySelector(".correctText");
        if(old) old.remove();

        if(selected && selected.value===q.answer){
            score++;
            div.classList.add("correct");
        } else {
            div.classList.add("wrong");

            const p = document.createElement("p");
            p.className="correctText";
            p.innerText="Correct Answer: "+q.answer;
            div.appendChild(p);
        }
    });

    document.getElementById("result").innerText = `Score: ${score} / 30`;
}

loadQuiz();

</script>

</body>
</html>
